name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  syntax-check:
    name: PHP ${{ matrix.php-version }} Syntax
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check PHP syntax
        run: |
          find src -name "*.php" -exec php -l {} \;
          php -l wp-djot.php
          php -l uninstall.php

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: composer stan

  coding-standards:
    name: Coding Standards
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check coding standards
        run: composer cs-check

  tests:
    name: PHP ${{ matrix.php-version }} Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPUnit
        run: composer test

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      # Plugin Check inspects the shipped plugin, so install runtime deps only.
      - name: Install runtime dependencies
        run: composer install --no-dev --prefer-dist --no-progress

      # Stage the plugin as it actually ships (mirror .distignore) so dev-only
      # files (scripts, configs, dotfiles, docs) aren't flagged as plugin files.
      - name: Stage distribution copy
        run: |
          mkdir -p ../dist/djot-markup
          grep -vE '^\s*(#|$)' .distignore > /tmp/distignore-excludes
          rsync -a --delete \
            --exclude='.git' \
            --exclude-from=/tmp/distignore-excludes \
            ./ ../dist/djot-markup/

      - name: Run Plugin Check
        uses: WordPress/plugin-check-action@v1
        with:
          build-dir: '../dist/djot-markup'
          # The repo folder is wp-djot but the plugin slug / text domain is
          # djot-markup; without this every __() flags a text-domain mismatch.
          slug: 'djot-markup'
          # Third-party runtime code we don't control.
          exclude-directories: 'vendor'
          # Errors-only enforcement: warnings (error_log, slow meta_query,
          # broad enqueue scope) are reported but don't fail the build.
          ignore-warnings: 'true'

  integration:
    name: WP Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      # The plugin loads its runtime deps from vendor/, so install them before
      # wp-env mounts the directory as an active plugin.
      - name: Install runtime dependencies
        run: composer install --no-dev --prefer-dist --no-progress

      # Written here rather than committed: a repo-root .wp-env.json would be
      # picked up by the Plugin Check job and break its dist-scanning config.
      - name: Write wp-env config
        run: |
          cat > .wp-env.json <<'JSON'
          {
            "plugins": ["."],
            "phpVersion": "8.3",
            "config": { "WP_DEBUG": true, "WP_DEBUG_DISPLAY": false }
          }
          JSON

      - name: Start WordPress (wp-env)
        run: npx @wordpress/env start

      - name: Run integration checks
        run: npx @wordpress/env run cli wp eval-file wp-content/plugins/wp-djot/tests/integration/checks.php

      - name: Stop WordPress
        if: always()
        run: npx @wordpress/env stop
