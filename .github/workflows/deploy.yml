name: Deploy to WordPress.org

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to WordPress.org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate version consistency
        run: |
          TAG="${{ github.event.release.tag_name }}"
          HEADER_VERSION=$(grep -oP '^\s*\*\s*Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' wp-djot.php)
          CONSTANT_VERSION=$(grep -oP "define\('WPDJOT_VERSION',\s*'\K[0-9]+\.[0-9]+\.[0-9]+" wp-djot.php)
          STABLE_TAG=$(grep -oP '^Stable tag:\s*\K[0-9]+\.[0-9]+\.[0-9]+' readme.txt)

          echo "Release tag:      $TAG"
          echo "Header version:   $HEADER_VERSION"
          echo "Constant version: $CONSTANT_VERSION"
          echo "Stable tag:       $STABLE_TAG"

          ERRORS=0
          if [ "$HEADER_VERSION" != "$CONSTANT_VERSION" ]; then
            echo "::error::Plugin header version ($HEADER_VERSION) does not match WPDJOT_VERSION constant ($CONSTANT_VERSION)"
            ERRORS=1
          fi
          if [ "$HEADER_VERSION" != "$STABLE_TAG" ]; then
            echo "::error::Plugin header version ($HEADER_VERSION) does not match readme.txt stable tag ($STABLE_TAG)"
            ERRORS=1
          fi
          if [ "$HEADER_VERSION" != "$TAG" ]; then
            echo "::error::Plugin header version ($HEADER_VERSION) does not match release tag ($TAG)"
            ERRORS=1
          fi
          if [ "$ERRORS" -ne 0 ]; then
            echo "::error::Version mismatch detected. Run ./scripts/version.sh $TAG to fix."
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check PHP syntax
        run: |
          find src -name "*.php" -exec php -l {} \;
          php -l wp-djot.php
          php -l uninstall.php

      - name: Run PHPStan
        run: composer stan

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Downgrade PHP 8.2 syntax for WordPress.org
        run: |
          composer require --dev rector/rector --no-progress --quiet
          # Create bootstrap to define ABSPATH (prevents exit in WP plugin files)
          echo "<?php define('ABSPATH', '/tmp/');" > rector-bootstrap.php
          # Create rector config for downgrading vendor to PHP 8.1
          cat > rector.php << 'EOF'
          <?php
          declare(strict_types=1);
          use Rector\Config\RectorConfig;
          use Rector\Set\ValueObject\DowngradeLevelSetList;
          return RectorConfig::configure()
              ->withBootstrapFiles([__DIR__ . '/rector-bootstrap.php'])
              ->withPaths([__DIR__ . '/vendor'])
              ->withSets([DowngradeLevelSetList::DOWN_TO_PHP_81]);
          EOF
          # Run rector with -d flag to load bootstrap before autoloader
          php -d auto_prepend_file=rector-bootstrap.php vendor/bin/rector process vendor --no-diffs || true
          rm -f rector-bootstrap.php rector.php
          composer install --no-dev --prefer-dist --no-progress --optimize-autoloader --quiet

      - name: WordPress Plugin Deploy
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: djot-markup

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deploy.outputs.zip-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
